modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "icon.png"
description = '''
Stone torches and torch arrows. A stone torch is crafted with stone sticks
and works just like a regular torch. Torch arrows place a torch wherever they land.
'''
author = "Kwahson"
displayURL = "https://github.com/tophc7/Torches"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.219,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "the_fletching_table"
type = "optional"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "sodiumdynamiclights"
type = "optional"
ordering = "NONE"
side = "CLIENT"
